<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل العملية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>body { background-color: #f4f7f6; padding-top: 50px; }</style>
</head>
<body class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h4 class="text-primary mb-4 fw-bold">✏️ تعديل العملية</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">البيان</label>
                        <input type="text" name="title" class="form-control" value="{{ debt.title }}" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold small">المبلغ الأصلي</label>
                            <input type="number" step="0.01" name="original_amount" class="form-control" value="{{ debt.original_amount }}" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold small">المبلغ المتبقي حالياً</label>
                            <input type="number" step="0.01" name="amount" class="form-control" value="{{ debt.amount }}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold small">النوع</label>
                            <select name="debt_type" class="form-select">
                                <option value="دفع عادي" {% if debt.debt_type == 'دفع عادي' %}selected{% endif %}>كاش</option>
                                <option value="قسط" {% if debt.debt_type == 'قسط' %}selected{% endif %}>قسط</option>
                            </select>
                        </div>
                        <div class="col-6 mb-4">
                            <label class="form-label fw-bold small">عدد الشهور الكلي</label>
                            <input type="number" name="months" class="form-control" value="{{ debt.months }}">
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1 rounded-pill fw-bold">حفظ التغييرات</button>
                        <a href="{{ url_for('index', card=debt.card_name) }}" class="btn btn-light rounded-pill px-4">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
