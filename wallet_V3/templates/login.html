<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - محفظتي المالية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f0f2f5 0%, #c3cfe2 100%);
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            border: none;
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd 0%, #0040a1 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .login-body { padding: 40px; }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
            background-color: #f8f9fa;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
            border-color: #0d6efd;
            background-color: white;
        }
        .btn-login {
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            background: linear-gradient(135deg, #0d6efd 0%, #0040a1 100%);
            border: none;
            transition: 0.3s;
        }
        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .brand-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="login-header">
            <div class="brand-icon">💰</div>
            <h3 class="fw-bold mb-1">محفظتي المالية</h3>
            <p class="mb-0 small opacity-75">أهلاً بك مجدداً، سجل دخولك للمتابعة</p>
        </div>
        <div class="login-body">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger alert-dismissible fade show small rounded-3" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">اسم المستخدم</label>
                    <input type="text" name="username" class="form-control" placeholder="اكتب اسمك هنا..." required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">كلمة المرور</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login w-100 mb-3">تسجيل الدخول</button>
                <div class="text-center small mt-4">
                    <span class="text-muted">ليس لديك حساب؟</span>
                    <a href="/register" class="text-primary fw-bold text-decoration-none">إنشاء حساب جديد</a>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
